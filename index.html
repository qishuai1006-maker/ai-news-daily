<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI News Daily · 每日 AI 资讯</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-gradient"></div>
<div class="bg-grid"></div>

<div class="container">

  <!-- 顶部 Hero 区 -->
  <header class="hero">
    <div class="hero-badge">
      <span class="dot"></span>
      <span id="update-time">数据加载中...</span>
    </div>
    <h1 class="hero-title">
      <span class="title-main">AI News Daily</span>
      <span class="title-sub">每日 AI 资讯精选</span>
    </h1>
    <p class="hero-desc">由玛瑞自动采集 · 每天 12:00 更新 · 官方 + X 推文 + 全网搜索 + 媒体 四层精选</p>
  </header>

  <!-- 统计卡片 -->
  <div class="stats" id="stats">
    <div class="stat-card">
      <div class="stat-num" id="stat-total">--</div>
      <div class="stat-label">今日精选</div>
    </div>
    <div class="stat-card stat-t1">
      <div class="stat-num" id="stat-news">--</div>
      <div class="stat-label">新闻</div>
    </div>
    <div class="stat-card stat-t15">
      <div class="stat-num" id="stat-x">--</div>
      <div class="stat-label">X 推文</div>
    </div>
    <div class="stat-card stat-t2">
      <div class="stat-num" id="stat-media">--</div>
      <div class="stat-label">来源</div>
    </div>
  </div>

  <!-- 筛选 / 搜索 -->
  <div class="filter-bar">
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="🔍 搜索新闻标题或来源..." />
    </div>
  </div>

  <!-- X 推文专区（独立显示） -->
  <section class="x-section" id="x-section">
    <div class="section-header">
      <h2 class="section-title">🐦 X 推文</h2>
      <span class="section-sub">核心人物动态</span>
    </div>
    <div id="x-container" class="x-feed">
      <div class="loading"><p>加载中...</p></div>
    </div>
  </section>

  <!-- 新闻专区（官方 + Exa + 媒体混在一起） -->
  <section class="news-section" id="news-section">
    <div class="section-header">
      <h2 class="section-title">📰 新闻</h2>
      <span class="section-sub">官方发布 · 全网热点 · 媒体报道</span>
    </div>
    <div id="news-container" class="news-grid">
      <div class="loading">
        <div class="spinner"></div>
        <p>正在加载今日新闻...</p>
      </div>
    </div>
  </section>

  <!-- 历史归档区 -->
  <section class="archive-section">
    <h2 class="section-title">📚 历史归档</h2>
    <div id="archive-list" class="archive-list">
      <p class="archive-empty">暂无历史数据</p>
    </div>
  </section>

  <footer class="footer">
    <p>由玛瑞自动采集 · 基于 AIHOT 信源分级经验 · T1/T1.5/T1.6/T2 四层精选</p>
    <p class="footer-sub">数据更新：每天 12:00 · GitHub Pages 全球访问</p>
  </footer>

</div>

<script src="data.js" defer></script>
<script src="app.js" defer onerror="alert('app.js load error')"></script>
<script>
  // 调试：捕获初始化错误并显示在页面上
  window.addEventListener('error', (e) => {
    const banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c00;color:white;padding:8px;z-index:9999;font-family:monospace;font-size:12px;';
    banner.textContent = 'JS Error: ' + e.message + ' @ ' + e.filename + ':' + e.lineno;
    document.body.appendChild(banner);
  });
</script>

</body>
</html>
